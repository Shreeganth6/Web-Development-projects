<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Italian Flag</title>
    <style>
      .container {
        display: flex;
        width: 600px;
        height: 400px;
      }

      .green {
        background-color: green;
        display: block;
        width: 33%;
        height: 100%;
      }

      .white {
        background-color: white;
        width: 33%;
        height: 100%;
      }

      .red {
        background-color: red;
        width: 33%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="green"></div>
      <div class="white"></div>
      <div class="red"></div>
    </div>
  </body>
</html>
